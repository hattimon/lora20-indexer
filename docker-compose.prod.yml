services:
  indexer:
    build:
      context: .
    container_name: lora20-indexer
    restart: unless-stopped
    init: true
    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORE_BACKEND: ${STORE_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lora20:lora20@postgres:5432/lora20}
      CHIRPSTACK_WEBHOOK_TOKEN: ${CHIRPSTACK_WEBHOOK_TOKEN:-}
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: lora20-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lora20}
      POSTGRES_USER: ${POSTGRES_USER:-lora20}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora20} -d ${POSTGRES_DB:-lora20}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: lora20-caddy
    restart: unless-stopped
    profiles: ["https"]
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      indexer:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
