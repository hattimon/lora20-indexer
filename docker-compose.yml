services:
  indexer:
    build:
      context: .
    restart: unless-stopped
    init: true
    environment:
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STORE_BACKEND: ${STORE_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lora20:lora20@postgres:5432/lora20}
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lora20}
      POSTGRES_USER: ${POSTGRES_USER:-lora20}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora20} -d ${POSTGRES_DB:-lora20}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
